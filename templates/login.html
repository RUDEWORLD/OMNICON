<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnicon Login</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/fontawesome.min.css') }}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 10px;
        }
    </style>
    <script>
    // External resource fetch monitor - logs any attempts to load from the internet
    (function() {
        var externalFetches = [];
        window.addEventListener('load', function() {
            var resources = performance.getEntriesByType('resource');
            var external = resources.filter(function(r) {
                return !r.name.includes(location.hostname) && r.name.match(/^https?:\/\//);
            });
            if (external.length > 0) {
                console.error('[EXTERNAL RESOURCE AUDIT] ' + external.length + ' external resource(s) detected:');
                external.forEach(function(r) {
                    console.error('  - ' + r.initiatorType + ': ' + r.name);
                });
                var banner = document.createElement('div');
                banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#dc3545;color:white;padding:8px 16px;font-size:13px;z-index:99999;text-align:center;';
                banner.innerHTML = '<strong>WARNING:</strong> ' + external.length + ' external resource(s) loaded from the internet. Check browser console (F12) for details.';
                document.body.appendChild(banner);
            } else {
                console.log('[EXTERNAL RESOURCE AUDIT] All resources loaded locally. No external fetches detected.');
            }
        });
    })();
    </script>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-server"></i>
            <h2>Omnicon Control Panel</h2>
            <p class="text-muted">Please login to continue</p>
        </div>

        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">Default: admin / omnicon</small>
        </div>
    </div>
</body>
</html>
