<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Omnicon Control Panel{% endblock %}</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/fontawesome.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
    <script>
    // External resource fetch monitor - logs any attempts to load from the internet
    (function() {
        var externalFetches = [];
        var origOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            if (typeof url === 'string' && url.match(/^https?:\/\//) && !url.includes(location.hostname)) {
                console.warn('[EXTERNAL FETCH] XHR: ' + method + ' ' + url);
                externalFetches.push({type: 'XHR', method: method, url: url, time: new Date().toISOString()});
            }
            return origOpen.apply(this, arguments);
        };
        if (window.fetch) {
            var origFetch = window.fetch;
            window.fetch = function(input) {
                var url = typeof input === 'string' ? input : (input && input.url ? input.url : '');
                if (url.match(/^https?:\/\//) && !url.includes(location.hostname)) {
                    console.warn('[EXTERNAL FETCH] fetch: ' + url);
                    externalFetches.push({type: 'fetch', url: url, time: new Date().toISOString()});
                }
                return origFetch.apply(this, arguments);
            };
        }
        window.addEventListener('load', function() {
            var resources = performance.getEntriesByType('resource');
            var external = resources.filter(function(r) {
                return !r.name.includes(location.hostname) && r.name.match(/^https?:\/\//);
            });
            if (external.length > 0) {
                console.error('[EXTERNAL RESOURCE AUDIT] ' + external.length + ' external resource(s) detected:');
                external.forEach(function(r) {
                    console.error('  - ' + r.initiatorType + ': ' + r.name + ' (' + Math.round(r.duration) + 'ms)');
                    externalFetches.push({type: r.initiatorType, url: r.name, duration: Math.round(r.duration)});
                });
                var banner = document.createElement('div');
                banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#dc3545;color:white;padding:8px 16px;font-size:13px;z-index:99999;text-align:center;';
                banner.innerHTML = '<strong>WARNING:</strong> ' + external.length + ' external resource(s) loaded from the internet. Check browser console (F12) for details.';
                document.body.appendChild(banner);
            } else {
                console.log('[EXTERNAL RESOURCE AUDIT] All resources loaded locally. No external fetches detected.');
            }
            window._externalFetchLog = externalFetches;
        });
    })();
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-server"></i> Omnicon Control Panel <small class="text-muted">{{ app_version }}</small>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
